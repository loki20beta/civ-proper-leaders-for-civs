<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crop Position Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #1a1a2e;
    color: #e0d8c8;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ---- Top bar ---- */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
}

.nav-btn {
    background: #2a2a4a;
    border: 1px solid #444;
    color: #e0d8c8;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
}
.nav-btn:hover { background: #3a3a5a; }

.pair-label {
    font-size: 15px;
    font-weight: 600;
    color: #c8a86e;
    min-width: 200px;
    text-align: center;
}

.pair-counter { font-size: 11px; color: #8a7e6b; }

.mode-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: #2a2a4a;
    color: #8a7e6b;
}

.dirty-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f0c040;
    opacity: 0;
    transition: opacity 0.2s;
}
.dirty-dot.visible { opacity: 1; }

/* ---- Banner area ---- */
.banner-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    min-height: 0;
}

.banner-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

.banner-wrap {
    position: relative;
    width: 128px;
    height: 180px;
}

.banner-wrap canvas,
.banner-wrap img {
    display: block;
    width: 128px;
    height: 180px;
}

.banner-wrap.interactive { cursor: grab; }
.banner-wrap.interactive:active { cursor: grabbing; }
.banner-wrap.locked { opacity: 0.85; }

.banner-label-row {
    display: flex;
    align-items: center;
    gap: 4px;
}

.banner-label { font-size: 11px; color: #8a7e6b; }

.lock-btn {
    background: none;
    border: 1px solid #444;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    padding: 1px 5px;
    color: #8a7e6b;
    line-height: 1.2;
}
.lock-btn:hover { border-color: #c8a86e; color: #c8a86e; }
.lock-btn.unlocked { color: #c8a86e; border-color: #c8a86e; }

.banner-ribbon {
    width: 42px;
    height: 45px;
    margin-top: -12px;
    position: relative;
    border-left: 1px solid rgba(255,255,255,0.15);
    border-right: 1px solid rgba(255,255,255,0.15);
}
.banner-ribbon-point {
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 0; height: 0;
    border-left: 21px solid transparent;
    border-right: 21px solid transparent;
    border-top: 10px solid;
}

/* ---- Bottom controls ---- */
.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 8px 16px;
    border-top: 1px solid #333;
    flex-shrink: 0;
}

.crop-info {
    font-family: 'Consolas', monospace;
    font-size: 11px;
    color: #c8a86e;
}

.save-controls {
    display: flex;
    align-items: center;
    gap: 8px;
}

.save-controls label { font-size: 11px; cursor: pointer; }

#save-btn {
    padding: 4px 14px;
    background: #4a3a2a;
    border: 1px solid #c8a86e;
    color: #c8a86e;
    font-size: 12px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
}
#save-btn:hover { background: #5a4a3a; }

#save-status { font-size: 11px; color: #8a7e6b; }

.shortcuts { font-size: 10px; color: #555; }
.shortcuts kbd {
    background: #2a2a4a;
    padding: 1px 4px;
    border-radius: 2px;
    border: 1px solid #444;
    font-size: 10px;
}
</style>
</head>
<body>

<div class="top-bar">
    <button class="nav-btn" id="prev-btn">&larr;</button>
    <span class="pair-label" id="pair-label">Loading...</span>
    <span class="dirty-dot" id="dirty-dot"></span>
    <button class="nav-btn" id="next-btn">&rarr;</button>
    <span class="pair-counter" id="pair-counter"></span>
    <span class="mode-badge" id="mode-badge"></span>
</div>

<div class="banner-area">
    <!-- Ada reference -->
    <div class="banner-item">
        <div class="banner-wrap">
            <img src="/api/reference_icon/ada_lovelace/128">
        </div>
        <div class="banner-ribbon" style="background:linear-gradient(180deg,#4a6a8a,#2a4a6a)">
            <div class="banner-ribbon-point" style="border-top-color:#2a4a6a"></div>
        </div>
        <div class="banner-label">Ada (ref)</div>
    </div>

    <!-- Neutral -->
    <div class="banner-item">
        <div class="banner-wrap interactive" data-expr="neutral">
            <canvas id="preview-neutral" width="128" height="180"></canvas>
        </div>
        <div class="banner-ribbon" style="background:linear-gradient(180deg,#4a6a8a,#2a4a6a)">
            <div class="banner-ribbon-point" style="border-top-color:#2a4a6a"></div>
        </div>
        <div class="banner-label" style="color:#c8a86e">Neutral</div>
    </div>

    <!-- Happy -->
    <div class="banner-item">
        <div class="banner-wrap interactive" data-expr="happy">
            <canvas id="preview-happy" width="128" height="180"></canvas>
        </div>
        <div class="banner-ribbon" style="background:linear-gradient(180deg,#3a6a3a,#1a4a1a)">
            <div class="banner-ribbon-point" style="border-top-color:#1a4a1a"></div>
        </div>
        <div class="banner-label-row">
            <span class="banner-label">Happy</span>
            <button class="lock-btn" data-expr="happy" title="Toggle lock">lock</button>
        </div>
    </div>

    <!-- Angry -->
    <div class="banner-item">
        <div class="banner-wrap interactive" data-expr="angry">
            <canvas id="preview-angry" width="128" height="180"></canvas>
        </div>
        <div class="banner-ribbon" style="background:linear-gradient(180deg,#6a3a3a,#4a1a1a)">
            <div class="banner-ribbon-point" style="border-top-color:#4a1a1a"></div>
        </div>
        <div class="banner-label-row">
            <span class="banner-label">Angry</span>
            <button class="lock-btn" data-expr="angry" title="Toggle lock">lock</button>
        </div>
    </div>

    <!-- Genghis reference -->
    <div class="banner-item">
        <div class="banner-wrap">
            <img src="/api/reference_icon/genghis_khan/128">
        </div>
        <div class="banner-ribbon" style="background:linear-gradient(180deg,#7a6a3a,#5a4a1a)">
            <div class="banner-ribbon-point" style="border-top-color:#5a4a1a"></div>
        </div>
        <div class="banner-label">Genghis (ref)</div>
    </div>
</div>

<div class="controls">
    <span class="crop-info" id="crop-info">x:0 y:0 size:200</span>
    <div class="save-controls">
        <label><input type="radio" name="save-level" value="civ" checked> Civ</label>
        <label><input type="radio" name="save-level" value="leader"> Leader</label>
        <button id="save-btn">Save Crop</button>
        <span id="save-status"></span>
    </div>
    <div class="shortcuts">
        <kbd>&larr;</kbd><kbd>&rarr;</kbd> nav &nbsp;
        <kbd>R</kbd> reset &nbsp;
        <kbd>S</kbd> save &nbsp;
        <kbd>scroll</kbd> zoom &nbsp;
        <kbd>drag</kbd> pan
    </div>
</div>

<script>
// ================================================================
// Constants
// ================================================================
const HEX_ASPECT = 2 / Math.sqrt(3); // equilateral hex height/width
const EXPRESSIONS = ["neutral", "happy", "angry"];

// ================================================================
// State
// ================================================================
let pairs = [];
let pairIdx = 0;

// Crops: neutral always set; happy/angry null when locked (follows neutral)
let crops = {
    neutral: { x: 0, y: 0, size: 200 },
    happy: null,
    angry: null
};

let locks = { happy: true, angry: true };

// Images per expression: { raw: Image|null, bg: Image|null }
let images = {
    neutral: { raw: null, bg: null },
    happy: { raw: null, bg: null },
    angry: { raw: null, bg: null }
};

let dirty = false;
let dragState = null;

// ================================================================
// DOM refs
// ================================================================
const pairLabel = document.getElementById("pair-label");
const pairCounter = document.getElementById("pair-counter");
const modeBadge = document.getElementById("mode-badge");
const cropInfoEl = document.getElementById("crop-info");
const saveStatus = document.getElementById("save-status");
const dirtyDot = document.getElementById("dirty-dot");

// ================================================================
// Hex geometry
// ================================================================

/** 6 vertices of an equilateral pointy-top hex with circumradius R. */
function getHexPoints(cx, cy, R) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 6 + i * Math.PI / 3;
        pts.push([cx + R * Math.cos(angle), cy + R * Math.sin(angle)]);
    }
    return pts;
}

/** Trace hex path on a canvas context. */
function hexPath(c, cx, cy, R) {
    const pts = getHexPoints(cx, cy, R);
    c.beginPath();
    c.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < 6; i++) c.lineTo(pts[i][0], pts[i][1]);
    c.closePath();
}

// ================================================================
// Crop helpers
// ================================================================

function getCrop(expr) {
    if (expr === "neutral") return crops.neutral;
    return crops[expr] || crops.neutral;
}

/** Which crop is actually modified when interacting with this expression? */
function getEffectiveExpr(expr) {
    if (expr === "neutral") return "neutral";
    return locks[expr] ? "neutral" : expr;
}

function setCropForExpr(expr, crop) {
    if (expr === "neutral") crops.neutral = crop;
    else crops[expr] = crop;
}

function clampCrop(crop) {
    const img = images.neutral.raw;
    if (!img) return;
    const h = crop.size * HEX_ASPECT;
    crop.size = Math.max(40, crop.size);
    crop.x = Math.max(0, Math.min(crop.x, img.width - crop.size));
    crop.y = Math.max(-h * 0.3, Math.min(crop.y, img.height - h * 0.7));
}

function autoCenterCrop() {
    const img = images.neutral.raw;
    if (!img) return { x: 0, y: 0, size: 200 };
    const size = img.width * 0.8;
    const h = size * HEX_ASPECT;
    return {
        size,
        x: img.width * 0.1,
        y: Math.max(0, (img.height - h) * 0.3)
    };
}

// ================================================================
// Preview rendering
// ================================================================

function drawPreview(expr) {
    const canvas = document.getElementById(`preview-${expr}`);
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const img = images[expr].bg || images[expr].raw;
    if (!img) return;

    const crop = getCrop(expr);

    // Equilateral hex centered in preview canvas
    const hexW = w - 4;
    const R = hexW / Math.sqrt(3);
    const hexCX = w / 2;
    const hexCY = h / 2;

    // Scale: preview hex width / source crop width
    const scale = hexW / crop.size;

    // Source hex center -> preview hex center
    const srcCX = crop.x + crop.size / 2;
    const srcCY = crop.y + crop.size * HEX_ASPECT / 2;
    const srcViewW = w / scale;
    const srcViewH = h / scale;
    const srcViewX = srcCX - srcViewW / 2;
    const srcViewY = srcCY - srcViewH / 2;

    // Clip: open at top, follows hex at bottom (game behavior)
    ctx.save();
    const pts = getHexPoints(hexCX, hexCY, R);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(w, 0);
    ctx.lineTo(w, pts[0][1]);
    ctx.lineTo(pts[0][0], pts[0][1]);
    ctx.lineTo(pts[1][0], pts[1][1]);
    ctx.lineTo(pts[2][0], pts[2][1]);
    ctx.lineTo(0, pts[2][1]);
    ctx.lineTo(0, 0);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(img, srcViewX, srcViewY, srcViewW, srcViewH, 0, 0, w, h);
    ctx.restore();

    // Hex border
    ctx.save();
    hexPath(ctx, hexCX, hexCY, R);
    ctx.strokeStyle = "#8b7346";
    ctx.lineWidth = 4;
    ctx.stroke();
    hexPath(ctx, hexCX, hexCY, R);
    ctx.strokeStyle = "#c8a86e";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
}

function drawAllPreviews() {
    EXPRESSIONS.forEach(drawPreview);
}

// ================================================================
// UI updates
// ================================================================

function updateCropInfo() {
    const crop = crops.neutral;
    const h = Math.round(crop.size * HEX_ASPECT);
    cropInfoEl.textContent = `x:${Math.round(crop.x)} y:${Math.round(crop.y)} size:${Math.round(crop.size)} (${Math.round(crop.size)}\u00d7${h})`;
}

function setDirty(val) {
    dirty = val;
    dirtyDot.classList.toggle("visible", dirty);
}

function updateLockUI() {
    document.querySelectorAll(".lock-btn").forEach(btn => {
        const expr = btn.dataset.expr;
        const locked = locks[expr];
        btn.textContent = locked ? "lock" : "free";
        btn.classList.toggle("unlocked", !locked);

        const wrap = document.querySelector(`.banner-wrap[data-expr="${expr}"]`);
        wrap.classList.toggle("locked", locked);
    });
}

// ================================================================
// Lock toggle
// ================================================================

document.querySelectorAll(".lock-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const expr = btn.dataset.expr;
        locks[expr] = !locks[expr];

        if (!locks[expr]) {
            // Unlocking: copy neutral crop as starting point
            crops[expr] = { ...crops.neutral };
        } else {
            // Locking: discard individual crop
            crops[expr] = null;
        }

        updateLockUI();
        drawAllPreviews();
        setDirty(true);
    });
});

// ================================================================
// Mouse interaction on previews
// ================================================================

document.querySelectorAll(".banner-wrap.interactive").forEach(wrap => {
    const expr = wrap.dataset.expr;

    wrap.addEventListener("mousedown", (e) => {
        const targetExpr = getEffectiveExpr(expr);
        const crop = getCrop(targetExpr);
        const canvas = wrap.querySelector("canvas");
        const hexW = canvas.width - 4;
        const scale = hexW / crop.size;

        dragState = {
            expr: targetExpr,
            startMX: e.clientX,
            startMY: e.clientY,
            startCrop: { ...crop },
            scale
        };
        e.preventDefault();
    });

    wrap.addEventListener("wheel", (e) => {
        e.preventDefault();
        const targetExpr = getEffectiveExpr(expr);
        const crop = { ...getCrop(targetExpr) };

        // Zoom centered on hex center
        const oldCX = crop.x + crop.size / 2;
        const oldCY = crop.y + crop.size * HEX_ASPECT / 2;

        const factor = e.deltaY > 0 ? 1.06 : 0.94;
        crop.size = Math.max(40, crop.size * factor);

        crop.x = oldCX - crop.size / 2;
        crop.y = oldCY - crop.size * HEX_ASPECT / 2;

        clampCrop(crop);
        setCropForExpr(targetExpr, crop);

        setDirty(true);
        drawAllPreviews();
        updateCropInfo();
    }, { passive: false });
});

window.addEventListener("mousemove", (e) => {
    if (!dragState) return;

    const dx = e.clientX - dragState.startMX;
    const dy = e.clientY - dragState.startMY;

    // Dragging right moves the view right = crop moves left in source
    const crop = {
        x: dragState.startCrop.x - dx / dragState.scale,
        y: dragState.startCrop.y - dy / dragState.scale,
        size: dragState.startCrop.size
    };

    clampCrop(crop);
    setCropForExpr(dragState.expr, crop);

    setDirty(true);
    drawAllPreviews();
    updateCropInfo();
});

window.addEventListener("mouseup", () => { dragState = null; });

// ================================================================
// Data loading
// ================================================================

function loadImage(url) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
    });
}

async function loadPairs() {
    const resp = await fetch("/api/pairs");
    pairs = await resp.json();
    if (pairs.length === 0) {
        pairLabel.textContent = "No pairs found";
        return;
    }
    const idx = pairs.findIndex(p => p.leader === "friedrich" && p.civ === "egypt");
    pairIdx = idx >= 0 ? idx : 0;
    loadCurrentPair();
}

async function loadCurrentPair() {
    if (pairs.length === 0) return;
    const pair = pairs[pairIdx];

    pairLabel.textContent = `${pair.leader} / ${pair.civ}`;
    pairCounter.textContent = `${pairIdx + 1} / ${pairs.length}`;
    modeBadge.textContent = pair.mode;
    setDirty(false);
    saveStatus.textContent = "";

    // Reset locks
    locks = { happy: true, angry: true };
    crops.happy = null;
    crops.angry = null;

    // Load crop meta
    let cropMeta = {};
    try {
        const resp = await fetch(`/api/crop/${pair.leader}/${pair.civ}`);
        cropMeta = await resp.json();
    } catch (e) {}

    // Load all images in parallel
    const pair_key = `${pair.leader}/${pair.civ}`;
    await Promise.all(EXPRESSIONS.flatMap(expr => [
        loadImage(`/api/image_raw/${pair_key}/${expr}`).then(img => { images[expr].raw = img; }),
        loadImage(`/api/image/${pair_key}/${expr}`).then(img => { images[expr].bg = img; })
    ]));

    // Set neutral crop from meta or auto-center
    if (cropMeta.neutral) {
        crops.neutral = { ...cropMeta.neutral };
    } else {
        crops.neutral = autoCenterCrop();
    }
    clampCrop(crops.neutral);

    // Detect per-expression overrides: if happy/angry differ from neutral, unlock them
    for (const expr of ["happy", "angry"]) {
        const meta = cropMeta[expr];
        const base = cropMeta.neutral;
        if (meta && base && (meta.x !== base.x || meta.y !== base.y || meta.size !== base.size)) {
            locks[expr] = false;
            crops[expr] = { ...meta };
        }
    }

    updateLockUI();
    drawAllPreviews();
    updateCropInfo();
}

// ================================================================
// Navigation
// ================================================================

document.getElementById("prev-btn").addEventListener("click", () => {
    if (pairs.length === 0) return;
    pairIdx = (pairIdx - 1 + pairs.length) % pairs.length;
    loadCurrentPair();
});

document.getElementById("next-btn").addEventListener("click", () => {
    if (pairs.length === 0) return;
    pairIdx = (pairIdx + 1) % pairs.length;
    loadCurrentPair();
});

// ================================================================
// Save
// ================================================================

async function postCrop(pair, level, expression, crop) {
    const resp = await fetch(`/api/crop/${pair.leader}/${pair.civ}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            level,
            expression,
            crop: { x: Math.round(crop.x), y: Math.round(crop.y), size: Math.round(crop.size) }
        })
    });
    if (!resp.ok) throw new Error(await resp.text());
}

document.getElementById("save-btn").addEventListener("click", async () => {
    const pair = pairs[pairIdx];
    if (!pair) return;

    const level = document.querySelector('input[name="save-level"]:checked').value;
    saveStatus.textContent = "Saving...";
    saveStatus.style.color = "#8a7e6b";

    try {
        if (locks.happy && locks.angry) {
            // All locked: save as "default" (applies to all expressions)
            await postCrop(pair, level, "default", crops.neutral);
        } else {
            // Save neutral explicitly
            await postCrop(pair, level, "neutral", crops.neutral);
            if (!locks.happy && crops.happy) {
                await postCrop(pair, level, "happy", crops.happy);
            }
            if (!locks.angry && crops.angry) {
                await postCrop(pair, level, "angry", crops.angry);
            }
        }

        saveStatus.textContent = "Saved";
        saveStatus.style.color = "#8bc34a";
        setDirty(false);
    } catch (e) {
        saveStatus.textContent = `Error: ${e.message}`;
        saveStatus.style.color = "#e57373";
    }
});

// ================================================================
// Keyboard shortcuts
// ================================================================

document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    switch (e.key) {
        case "ArrowLeft":
            document.getElementById("prev-btn").click();
            e.preventDefault();
            break;
        case "ArrowRight":
            document.getElementById("next-btn").click();
            e.preventDefault();
            break;
        case "s": case "S":
            document.getElementById("save-btn").click();
            break;
        case "r": case "R":
            crops.neutral = autoCenterCrop();
            clampCrop(crops.neutral);
            for (const expr of ["happy", "angry"]) {
                if (!locks[expr] && crops[expr]) {
                    crops[expr] = { ...crops.neutral };
                }
            }
            setDirty(true);
            drawAllPreviews();
            updateCropInfo();
            break;
    }
});

// ================================================================
// Init
// ================================================================
updateLockUI();
loadPairs();
</script>
</body>
</html>
